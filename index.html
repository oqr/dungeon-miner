      const speed = 60 + Math.random() * 120;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const particle = { graphics: p, vx, vy, life: 500 + Math.random() * 400 };
      this.particles.push(particle);
      this.tweens.add({
        targets: p, alpha: 0, duration: particle.life, ease: 'Power2',
        onComplete: () => p.destroy()
      });
    }
  }

  // ===== STORE (fully visual) =====
  openStore() {
    if (this.storeOpen) return;
    this.storeOpen = true;
    this.storeSelectionIndex = 0;
    this.storeSection = 'buy';
    this.buildStoreItems();

    // Find the store tile position for the animation
    let storePx = 0, storePy = 0;
    const dirs = [[0,-1],[0,1],[-1,0],[1,0],[0,0]];
    for (const [ddx, ddy] of dirs) {
      const sx = this.playerGridX + ddx;
      const sy = this.playerGridY + ddy;
      if (sx >= 0 && sx < MAP_W && sy >= 0 && sy < MAP_H && this.mapData[sy][sx] === TILE.STORE) {
        storePx = sx * TILE_SIZE;
        storePy = sy * TILE_SIZE;
        break;
      }
    }

    // Shopkeeper walks away animation
    const anim = this.add.graphics().setDepth(25);
    // Draw shopkeeper head sliding down (ducking behind counter)
    let frame = 0;
    const walkAway = this.time.addEvent({
      delay: 60,
      repeat: 7,
      callback: () => {
        anim.clear();
        frame++;
        // Redraw window area
        anim.fillStyle(0x1A1A2E, 1);
        anim.fillRect(storePx + 6, storePy + 14, 28, 14);
        if (frame <= 4) {
          // Head sliding down behind counter
          const headY = storePy + 22 + frame * 3;
          anim.fillStyle(0xFFCC88, 1);
          anim.fillCircle(storePx + 20, headY, 7);
          anim.fillStyle(0x8B4513, 1);
          anim.fillRect(storePx + 13, headY - 9, 14, 3);
        }
        // Counter stays
        anim.fillStyle(0x6B5030, 1);
        anim.fillRect(storePx + 4, storePy + 28, 32, 4);
        anim.fillStyle(0xFFDD44, 0.8);
        anim.fillRect(storePx + 12, storePy + 29, 16, 3);

        if (frame === 8) {
          // After walking away, pause, then come back with store open
          this.time.delayedCall(300, () => {
            // Shopkeeper comes back up
            let returnFrame = 0;
            const walkBack = this.time.addEvent({
              delay: 60,
              repeat: 4,
              callback: () => {
                anim.clear();
                returnFrame++;
                anim.fillStyle(0x1A1A2E, 1);
                anim.fillRect(storePx + 6, storePy + 14, 28, 14);
                const headY = storePy + 34 - returnFrame * 3;
                anim.fillStyle(0xFFCC88, 1);
                anim.fillCircle(storePx + 20, headY, 7);
                anim.fillStyle(0x8B4513, 1);
                anim.fillRect(storePx + 13, headY - 9, 14, 3);
                anim.fillStyle(0x6B5030, 1);
                anim.fillRect(storePx + 4, storePy + 28, 32, 4);
                anim.fillStyle(0xFFDD44, 0.8);
                anim.fillRect(storePx + 12, storePy + 29, 16, 3);
                if (returnFrame === 4) {
                  anim.destroy();
                  this.renderStore();
                }
              }
            });
          });
        }
      }
    });
  }

  buildStoreItems() {
    // Buy items list
    this.storeBuyItems = [];
    // Pickaxes (show next available)
    if (gameState.pickaxeLevel + 1 < PICKAXES.length) {
      const i = gameState.pickaxeLevel + 1;
      this.storeBuyItems.push({
        type: 'pickaxe', level: i, cost: PICKAXES[i].cost,
        owned: false, canAfford: gameState.coins >= PICKAXES[i].cost
      });
    }
    // Swords (show next available)
    if (gameState.swordLevel + 1 < SWORDS.length) {
      const i = gameState.swordLevel + 1;
      this.storeBuyItems.push({
        type: 'sword', level: i, cost: SWORDS[i].cost,
        owned: false, canAfford: gameState.coins >= SWORDS[i].cost
      });
    }
    // Armor (show next available)
    if (gameState.armorLevel + 1 < ARMOR.length) {
      const i = gameState.armorLevel + 1;
      this.storeBuyItems.push({
        type: 'armor', level: i, cost: ARMOR[i].cost,
        owned: false, canAfford: gameState.coins >= ARMOR[i].cost
      });
    }
    // Potion
    this.storeBuyItems.push({
      type: 'potion', cost: POTION_COST,
      owned: false, canAfford: gameState.coins >= POTION_COST
    });

    // Sell items
    this.storeSellItems = [];
    const oreTypes = ['stone', 'copper', 'iron', 'gold'];
    for (const ore of oreTypes) {
      if (gameState.inventory[ore] > 0) {
        this.storeSellItems.push({
          type: ore, count: gameState.inventory[ore],
          value: gameState.inventory[ore] * SELL_PRICES[ore]
        });
      }
    }
  }

  renderStore() {
    if (this.storeUI) {
      this.storeUI.destroy(true);
      this.storeUI = null;
    }

    const cx = this.cameras.main.centerX;
    const cy = this.cameras.main.centerY;
    const W = 500;
    const H = 400;
    const left = cx - W/2;
    const top = cy - H/2;

    this.storeUI = this.add.container(0, 0).setScrollFactor(0).setDepth(60);

    // Dimmed background
    const bg = this.add.graphics();
    bg.fillStyle(0x000000, 0.85);
    bg.fillRect(0, 0, this.cameras.main.width, this.cameras.main.height);
    this.storeUI.add(bg);

    // Main panel
    const panel = this.add.graphics();
    panel.fillStyle(0x2A2A3E, 1);
    panel.lineStyle(3, COLORS.COIN, 1);
    panel.fillRoundedRect(left, top, W, H, 14);
    panel.strokeRoundedRect(left, top, W, H, 14);
    this.storeUI.add(panel);

    // Store NPC face at top
    const npc = this.add.graphics();
    npc.fillStyle(0xFFCC88, 1);
    npc.fillCircle(cx, top + 30, 18);
    npc.fillStyle(0x000000, 1);
    npc.fillCircle(cx - 6, top + 27, 3);
    npc.fillCircle(cx + 6, top + 27, 3);
    npc.lineStyle(2, 0x000000, 1);
    npc.beginPath();
    npc.arc(cx, top + 34, 6, 0.2, Math.PI - 0.2, false);
    npc.strokePath();
    npc.fillStyle(0x8B4513, 1);
    npc.fillRect(cx - 14, top + 10, 28, 5);
    npc.fillRect(cx - 10, top + 4, 20, 8);
    this.storeUI.add(npc);

    // Your coins display
    const coinBar = this.add.graphics();
    coinBar.fillStyle(0x000000, 0.4);
    coinBar.fillRoundedRect(left + 15, top + 52, W - 30, 24, 6);
    drawCoin(coinBar, left + 30, top + 64, 8);
    const cc = Math.min(gameState.coins, 25);
    for (let i = 0; i < cc; i++) {
      drawCoin(coinBar, left + 48 + i * 9, top + 64, 4);
    }
    if (gameState.coins > 25) {
      coinBar.fillStyle(0xFFFFFF, 0.6);
      coinBar.fillCircle(left + 48 + 25*9 + 6, top + 64, 1.5);
      coinBar.fillCircle(left + 48 + 25*9 + 11, top + 64, 1.5);
    }
    this.storeUI.add(coinBar);

    // === SELL Section (top) ===
    let sy = top + 85;
    const sellG = this.add.graphics();

    // Sell header: ore icon -> arrow -> coin icon
    if (this.storeSellItems.length > 0) {
      // Section divider
      sellG.fillStyle(0xFFFFFF, 0.15);
      sellG.fillRect(left + 20, sy, W - 40, 1);
      sy += 8;

      for (let i = 0; i < this.storeSellItems.length; i++) {
        const item = this.storeSellItems[i];
        const ix = left + 40;
        const iy = sy + i * 44 + 20;

        const isSelected = this.storeSection === 'sell' && this.storeSelectionIndex === i;

        // Selection highlight
        if (isSelected) {
          sellG.fillStyle(0xFFFFFF, 0.15);
          sellG.fillRoundedRect(left + 18, iy - 16, W - 36, 38, 8);
          sellG.lineStyle(2, COLORS.COIN, 1);
          sellG.strokeRoundedRect(left + 18, iy - 16, W - 36, 38, 8);
        }

        // Ore icon
        drawOreIcon(sellG, ix, iy, 22, item.type);

        // Quantity pips
        const pips = Math.min(item.count, 10);
        for (let p = 0; p < pips; p++) {
          sellG.fillStyle(0xFFFFFF, 0.7);
          sellG.fillCircle(ix + 20 + p * 6, iy, 2);
        }
        if (item.count > 10) {
          sellG.fillStyle(0xFFFFFF, 0.4);
          sellG.fillCircle(ix + 20 + 10*6 + 4, iy, 1.5);
          sellG.fillCircle(ix + 20 + 10*6 + 9, iy, 1.5);
        }

        // Arrow
        drawArrowRight(sellG, left + W/2 + 40, iy, 18);

        // Coins you'd get
        const coinCount = Math.min(Math.ceil(item.value / 2), 12);
        for (let c = 0; c < coinCount; c++) {
          drawCoin(sellG, left + W/2 + 70 + c * 10, iy, 5);
        }
      }
      sy += this.storeSellItems.length * 44 + 10;
    }

    // Divider
    sellG.fillStyle(0xFFFFFF, 0.2);
    sellG.fillRect(left + 20, sy, W - 40, 2);
    sy += 12;

    this.storeUI.add(sellG);

    // === BUY Section ===
    const buyG = this.add.graphics();
    this.buyStartY = sy;

    for (let i = 0; i < this.storeBuyItems.length; i++) {
      const item = this.storeBuyItems[i];
      const iy = sy + i * 48 + 20;
      const isSelected = this.storeSection === 'buy' && this.storeSelectionIndex === i;

      // Selection highlight
      if (isSelected) {
        buyG.fillStyle(0xFFFFFF, 0.15);
        buyG.fillRoundedRect(left + 18, iy - 18, W - 36, 42, 8);
        buyG.lineStyle(2, 0x44FF44, 1);
        buyG.strokeRoundedRect(left + 18, iy - 18, W - 36, 42, 8);
      }

      // Item icon
      const ix = left + 45;
      if (item.type === 'pickaxe') {
        drawPickaxe(buyG, ix, iy, 22, PICKAXES[item.level].color);
      } else if (item.type === 'sword') {
        drawSword(buyG, ix, iy, 22, SWORDS[item.level].color);
      } else if (item.type === 'armor') {
        drawShield(buyG, ix, iy, 22, ARMOR[item.level].color);
      } else if (item.type === 'potion') {
        drawPotion(buyG, ix, iy, 22);
      }

      // Cost in coin icons
      const costCoins = Math.min(Math.ceil(item.cost / 5), 15);
      for (let c = 0; c < costCoins; c++) {
        const alpha = item.canAfford ? 1 : 0.3;
        buyG.fillStyle(COLORS.COIN, alpha);
        buyG.fillCircle(ix + 40 + c * 11, iy, 5);
        buyG.fillStyle(COLORS.COIN_DARK, alpha);
        buyG.fillCircle(ix + 40 + c * 11, iy, 2.5);
      }

      // Dim if can't afford
      if (!item.canAfford) {
        buyG.fillStyle(0x000000, 0.4);
        buyG.fillRoundedRect(left + 18, iy - 18, W - 36, 42, 8);
      }
    }
    this.storeUI.add(buyG);

    // Close button (X in circle) at top right
    const closeG = this.add.graphics();
    closeG.fillStyle(0xFF5555, 1);
    closeG.fillCircle(left + W - 22, top + 22, 14);
    closeG.lineStyle(3, 0xFFFFFF, 1);
    closeG.lineBetween(left + W - 28, top + 16, left + W - 16, top + 28);
    closeG.lineBetween(left + W - 16, top + 16, left + W - 28, top + 28);
    this.storeUI.add(closeG);

    // Navigation hint: arrow icons at bottom
    const navG = this.add.graphics();
    const navY = top + H - 25;
    // Up arrow
    navG.fillStyle(0xFFFFFF, 0.5);
    navG.fillTriangle(cx - 60, navY, cx - 50, navY - 10, cx - 40, navY);
    // Down arrow
    navG.fillTriangle(cx - 20, navY - 10, cx - 10, navY, cx - 30, navY);
    // Space bar icon (rounded rect)
    navG.fillStyle(0xFFFFFF, 0.4);
    navG.fillRoundedRect(cx + 10, navY - 12, 50, 14, 4);
    navG.lineStyle(1, 0xFFFFFF, 0.6);
    navG.strokeRoundedRect(cx + 10, navY - 12, 50, 14, 4);
    // Checkmark on spacebar
    drawCheckmark(navG, cx + 35, navY - 5, 10);

    this.storeUI.add(navG);
  }

  handleStoreInput() {
    if (!this.storeOpen) return;

    const items = this.storeSection === 'sell' ? this.storeSellItems : this.storeBuyItems;
    const maxIdx = items.length - 1;

    // Navigate up/down
    if (Phaser.Input.Keyboard.JustDown(this.cursors.up) || Phaser.Input.Keyboard.JustDown(this.wasd.W)) {
      this.storeSelectionIndex--;
      if (this.storeSelectionIndex < 0) {
        // Switch section
        if (this.storeSection === 'buy' && this.storeSellItems.length > 0) {
          this.storeSection = 'sell';
          this.storeSelectionIndex = this.storeSellItems.length - 1;
        } else {
          this.storeSelectionIndex = items.length - 1;
        }
      }
      this.renderStore();
    }
    if (Phaser.Input.Keyboard.JustDown(this.cursors.down) || Phaser.Input.Keyboard.JustDown(this.wasd.S)) {
      this.storeSelectionIndex++;
      const currentItems = this.storeSection === 'sell' ? this.storeSellItems : this.storeBuyItems;
      if (this.storeSelectionIndex > currentItems.length - 1) {
        if (this.storeSection === 'sell') {
          this.storeSection = 'buy';
          this.storeSelectionIndex = 0;
        } else {
          this.storeSelectionIndex = 0;
        }
      }
      this.renderStore();
    }

    // Select with space
    if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
      if (this.storeSection === 'sell') {
        const item = this.storeSellItems[this.storeSelectionIndex];
        if (item && item.count > 0) {
          gameState.coins += item.value;
          gameState.inventory[item.type] = 0;
          // Sparkle feedback
          this.showPurchaseEffect();
          this.buildStoreItems();
          if (this.storeSellItems.length === 0) {
            this.storeSection = 'buy';
            this.storeSelectionIndex = 0;
          } else if (this.storeSelectionIndex >= this.storeSellItems.length) {
            this.storeSelectionIndex = Math.max(0, this.storeSellItems.length - 1);
          }
          this.renderStore();
        }
      } else {
        const item = this.storeBuyItems[this.storeSelectionIndex];
        if (item && item.canAfford) {
          if (item.type === 'pickaxe') {
            gameState.coins -= item.cost;
            gameState.pickaxeLevel = item.level;
          } else if (item.type === 'sword') {
            gameState.coins -= item.cost;
            gameState.swordLevel = item.level;
          } else if (item.type === 'armor') {
            gameState.coins -= item.cost;
            gameState.armorLevel = item.level;
          } else if (item.type === 'potion') {
            gameState.coins -= item.cost;
            gameState.inventory.potions++;
          }
          this.showPurchaseEffect();
          this.buildStoreItems();
          if (this.storeSelectionIndex >= this.storeBuyItems.length) {
            this.storeSelectionIndex = Math.max(0, this.storeBuyItems.length - 1);
          }
          this.renderStore();
        }
      }
    }

    // Close
    if (Phaser.Input.Keyboard.JustDown(this.eKey) || Phaser.Input.Keyboard.JustDown(this.escKey)) {
      this.closeStore();
    }
  }

  showPurchaseEffect() {
    // Big green checkmark flash
    const g = this.add.graphics().setScrollFactor(0).setDepth(70);
    const cx = this.cameras.main.centerX;
    const cy = this.cameras.main.centerY;
    g.fillStyle(0x44FF44, 0.3);
    g.fillCircle(cx, cy, 60);
    drawCheckmark(g, cx, cy, 40);

    this.tweens.add({
      targets: g, alpha: 0, scaleX: 1.5, scaleY: 1.5,
      duration: 600, ease: 'Power2',
      onComplete: () => g.destroy()
    });
  }

  closeStore() {
    if (this.storeUI) {
      this.storeUI.destroy(true);
      this.storeUI = null;
    }
    this.storeOpen = false;
    // Redraw player to show new armor/equipment
    this.drawPlayerBody(this.playerBody);
  }

  goDownStairs() {
    gameState.floor++;
    gameState.hp = Math.min(gameState.maxHp, gameState.hp + 4);
    this.cameras.main.fade(600, 0, 0, 0, false, (camera, progress) => {
      if (progress >= 1) this.scene.restart();
    });
  }

  freePrisoner(tx, ty) {
    // Turn prisoner tile into floor
    this.mapData[ty][tx] = TILE.FLOOR;
    this.drawTile(this.tileSprites[ty][tx], tx, ty);
    this.prisonersFreed++;

    // Celebration effect
    const px = tx * TILE_SIZE + TILE_SIZE / 2;
    const py = ty * TILE_SIZE + TILE_SIZE / 2;
    this.spawnSparkles(px, py, 12, 0xFFDD44);
    this.spawnSparkles(px, py, 8, 0x44FF44);
    this.cameras.main.flash(200, 100, 255, 100, true);

    // Freed person runs away (visual only)
    const freed = this.add.graphics().setDepth(25);
    freed.fillStyle(COLORS.PRISONER, 1);
    freed.fillRoundedRect(-8, -6, 16, 16, 4);
    freed.fillStyle(0xFFCC88, 1);
    freed.fillCircle(0, -8, 6);
    // Happy face
    freed.fillStyle(0x222222, 1);
    freed.fillCircle(-2, -9, 1.5);
    freed.fillCircle(2, -9, 1.5);
    freed.lineStyle(1.5, 0x222222, 1);
    freed.beginPath();
    freed.arc(0, -6, 3, 0.2, Math.PI - 0.2, false);
    freed.strokePath();
    freed.x = px;
    freed.y = py;
    // Run away animation
    const runDir = Math.random() < 0.5 ? -1 : 1;
    this.tweens.add({
      targets: freed, x: px + runDir * 200, y: py - 80, alpha: 0,
      duration: 1500, ease: 'Power2',
      onComplete: () => freed.destroy()
    });

    // Check if all prisoners are freed
    if (this.prisonersFreed >= this.prisonersToFree && this.isFinalJail) {
      this.time.delayedCall(800, () => this.showVictory());
    }
  }

  showVictory() {
    gameState.dead = true; // stop game updates

    const overlay = this.add.graphics().setScrollFactor(0).setDepth(100);
    overlay.fillStyle(0x000000, 0);
    // Fade in
    this.tweens.add({
      targets: overlay, alpha: 1, duration: 1000,
      onUpdate: (tween) => {
        overlay.clear();
        overlay.fillStyle(0x000000, tween.getValue() * 0.8);
        overlay.fillRect(0, 0, 800, 600);
      }
    });

    const cx = 400;
    const cy = 300;

    this.time.delayedCall(1200, () => {
      // Big golden star burst
      const starG = this.add.graphics().setScrollFactor(0).setDepth(101);
      starG.fillStyle(0xFFD700, 1);
      drawStar(starG, cx, cy - 80, 50, 25, 5);
      starG.fillStyle(0xFFFF88, 0.6);
      drawStar(starG, cx, cy - 80, 35, 18, 5);

      // YOU WON!
      this.add.text(cx, cy - 10, 'YOU WON!', {
        fontSize: '52px', fontFamily: 'Arial, sans-serif', fill: '#FFD700',
        stroke: '#000', strokeThickness: 8, fontStyle: 'bold'
      }).setOrigin(0.5).setScrollFactor(0).setDepth(101);

      // Everyone is free!
      this.add.text(cx, cy + 40, 'Everyone is free!', {
        fontSize: '24px', fontFamily: 'Arial, sans-serif', fill: '#FFFFFF',
        stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5).setScrollFactor(0).setDepth(101);

      // Freed people celebration
      const celebG = this.add.graphics().setScrollFactor(0).setDepth(101);
      const personColors = [0xFFAA66, 0xFF8844, 0xFFCC88, 0xDDAA55, 0xFFBB77, 0xEE9955];
      for (let i = 0; i < 6; i++) {
        const px = cx - 120 + i * 48;
        const py = cy + 100;
        celebG.fillStyle(personColors[i], 1);
        celebG.fillRoundedRect(px - 8, py, 16, 16, 4);
        celebG.fillStyle(0xFFCC88, 1);
        celebG.fillCircle(px, py - 4, 6);
        // Happy eyes
        celebG.fillStyle(0x222222, 1);
        celebG.fillCircle(px - 2, py - 5, 1);
        celebG.fillCircle(px + 2, py - 5, 1);
        // Arms up!
        celebG.fillStyle(personColors[i], 0.8);
        celebG.fillRect(px - 14, py - 6, 6, 3);
        celebG.fillRect(px + 8, py - 8, 6, 3);
      }

      // Sparkles everywhere
      for (let i = 0; i < 30; i++) {
        const sx = Math.random() * 800;
        const sy = Math.random() * 600;
        const sparkG = this.add.graphics().setScrollFactor(0).setDepth(102);
        sparkG.fillStyle(0xFFDD44, 0.8);
        const ss = 2 + Math.random() * 3;
        sparkG.fillRect(sx - ss/2, sy - 1, ss, 2);
        sparkG.fillRect(sx - 1, sy - ss/2, 2, ss);
        this.tweens.add({
          targets: sparkG, alpha: 0, scaleX: 0.2, scaleY: 0.2,
          duration: 800 + Math.random() * 1200,
          delay: Math.random() * 2000,
          yoyo: true, repeat: -1
        });
      }

      // Play again button
      const playBtn = this.add.graphics().setScrollFactor(0).setDepth(101);
      playBtn.fillStyle(0x44CC44, 1);
      playBtn.fillCircle(cx, cy + 170, 30);
      playBtn.fillStyle(0xFFFFFF, 1);
      playBtn.fillTriangle(cx - 10, cy + 155, cx - 10, cy + 185, cx + 16, cy + 170);

      this.tweens.add({
        targets: playBtn, scaleX: 1.12, scaleY: 1.12,
        duration: 600, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });

      this.input.keyboard.once('keydown-SPACE', () => {
        this.scene.start('TitleScene');
      });
    });
  }

  update(time, delta) {
    if (gameState.dead) return;

    // Timers
    if (gameState.attackCooldown > 0) gameState.attackCooldown -= delta;
    if (gameState.invincibleTimer > 0) gameState.invincibleTimer -= delta;

    // Health regen: 1 heart (2 hp) every 10 seconds
    if (gameState.hp < gameState.maxHp) {
      gameState.regenTimer += delta;
      if (gameState.regenTimer >= 10000) {
        gameState.regenTimer = 0;
        gameState.hp = Math.min(gameState.maxHp, gameState.hp + 2);
        this.spawnSparkles(this.player.x, this.player.y, 4, 0x44FF44);
      }
    } else {
      gameState.regenTimer = 0;
    }

    // Invincibility flash
    if (gameState.invincibleTimer > 0) {
      this.player.setAlpha(Math.sin(time * 0.02) > 0 ? 1 : 0.3);
    } else {
      this.player.setAlpha(1);
    }

    // Store input
    if (this.storeOpen) {
      this.handleStoreInput();
      this.updateHUD();
      return;
    }

    // Movement
    this.playerMoveTimer -= delta;
    if (this.playerMoveTimer <= 0) {
      let dx = 0, dy = 0;
      if (this.cursors.left.isDown || this.wasd.A.isDown) { dx = -1; gameState.facing = 'left'; }
      else if (this.cursors.right.isDown || this.wasd.D.isDown) { dx = 1; gameState.facing = 'right'; }
      else if (this.cursors.up.isDown || this.wasd.W.isDown) { dy = -1; gameState.facing = 'up'; }
      else if (this.cursors.down.isDown || this.wasd.S.isDown) { dy = 1; gameState.facing = 'down'; }

      if (dx !== 0 || dy !== 0) {
        const nx = this.playerGridX + dx;
        const ny = this.playerGridY + dy;
        if (this.isWalkable(nx, ny)) {
          this.playerGridX = nx;
          this.playerGridY = ny;
          this.playerMoveTimer = 110;

          this.tweens.add({
            targets: this.player,
            x: nx * TILE_SIZE + TILE_SIZE/2,
            y: ny * TILE_SIZE + TILE_SIZE/2,
            duration: 90,
            ease: 'Power1'
          });

          // Check stairs
          if (this.mapData[ny][nx] === TILE.STAIRS) {
            this.goDownStairs();
            return;
          }

          // Check prisoner rescue
          if (this.mapData[ny][nx] === TILE.PRISONER) {
            this.freePrisoner(nx, ny);
          }
        } else if (this.isMineable(nx, ny)) {
          this.mineTile(nx, ny);
          this.playerMoveTimer = 180;
        }
      }
    }

    // Attack
    if (Phaser.Input.Keyboard.JustDown(this.spaceKey)) {
      // Check for store first
      const dirs = [[0,-1],[0,1],[-1,0],[1,0],[0,0]];
      let nearStore = false;
      for (const [ddx, ddy] of dirs) {
        const cx = this.playerGridX + ddx;
        const cy = this.playerGridY + ddy;
        if (cx >= 0 && cx < MAP_W && cy >= 0 && cy < MAP_H && this.mapData[cy][cx] === TILE.STORE) {
          this.openStore();
          nearStore = true;
          break;
        }
      }
      if (!nearStore) {
        this.attack();
      }
    }

    // E also opens store
    if (Phaser.Input.Keyboard.JustDown(this.eKey)) {
      const dirs = [[0,-1],[0,1],[-1,0],[1,0],[0,0]];
      for (const [ddx, ddy] of dirs) {
        const cx = this.playerGridX + ddx;
        const cy = this.playerGridY + ddy;
        if (cx >= 0 && cx < MAP_W && cy >= 0 && cy < MAP_H && this.mapData[cy][cx] === TILE.STORE) {
          this.openStore();
          break;
        }
      }
    }

    // Manual potion: press F
    if (Phaser.Input.Keyboard.JustDown(this.fKey)) {
      this.usePotion();
    }

    // Auto-use potion when very low health (1 heart left) -- helper for kids
    if (gameState.hp <= 2 && gameState.inventory.potions > 0) {
      this.usePotion();
    }

    // Update butterfly companion
    this.updateButterfly(delta, time);
    this.updateHomingBalls(delta);

    // Update enemies
    for (const enemy of this.enemies) {
      if (!enemy.alive) continue;

      if (enemy.knockbackX !== 0 || enemy.knockbackY !== 0) {
        enemy.container.x += enemy.knockbackX;
        enemy.container.y += enemy.knockbackY;
        enemy.knockbackX *= 0.75;
        enemy.knockbackY *= 0.75;
        if (Math.abs(enemy.knockbackX) < 0.5 && Math.abs(enemy.knockbackY) < 0.5) {
          enemy.knockbackX = 0;
          enemy.knockbackY = 0;
          enemy.container.x = enemy.gridX * TILE_SIZE + TILE_SIZE/2;
          enemy.container.y = enemy.gridY * TILE_SIZE + TILE_SIZE/2;
        }
        continue;
      }

      if (enemy.flashTimer > 0) {
        enemy.flashTimer -= delta;
        enemy.graphics.setAlpha(Math.sin(time * 0.03) > 0 ? 1 : 0.3);
      } else {
        enemy.graphics.setAlpha(1);
      }

      // All enemies visible (no fog of war)
      enemy.container.setVisible(true);

      // AI movement (30% slower for kids)
      enemy.moveTimer -= delta;
      if (enemy.moveTimer <= 0) {
        const distToPlayer = Math.abs(enemy.gridX - this.playerGridX) + Math.abs(enemy.gridY - this.playerGridY);
        let mdx = 0, mdy = 0;
        if (distToPlayer <= enemy.chaseRange) {
          const pdx = this.playerGridX - enemy.gridX;
          const pdy = this.playerGridY - enemy.gridY;
          if (Math.abs(pdx) > Math.abs(pdy)) { mdx = pdx > 0 ? 1 : -1; }
          else { mdy = pdy > 0 ? 1 : -1; }
        } else {
          const dir = Math.floor(Math.random() * 4);
          if (dir === 0) mdx = 1;
          else if (dir === 1) mdx = -1;
          else if (dir === 2) mdy = 1;
          else mdy = -1;
        }

        const enx = enemy.gridX + mdx;
        const eny = enemy.gridY + mdy;
        if (this.isWalkable(enx, eny)) {
          const blocked = this.enemies.some(e => e !== enemy && e.alive && e.gridX === enx && e.gridY === eny);
          if (!blocked) {
            enemy.gridX = enx;
            enemy.gridY = eny;
            this.tweens.add({
              targets: enemy.container,
              x: enx * TILE_SIZE + TILE_SIZE/2,
              y: eny * TILE_SIZE + TILE_SIZE/2,
              duration: 250, ease: 'Power1'
            });
          }
        }

        // 30% slower movement for kids
        const speedFactor = distToPlayer <= enemy.chaseRange ? 1.0 : 1.6;
        enemy.moveTimer = (1000 / (enemy.speed / 60)) * speedFactor * 1.3;
      }

      // Damage on contact
      if (enemy.gridX === this.playerGridX && enemy.gridY === this.playerGridY) {
        this.damagePlayer(enemy.damage);
      }

      // Enemies can hurt the butterfly if close enough
      if (this.butterfly && this.butterfly.alive) {
        const bdx = this.butterfly.container.x - enemy.container.x;
        const bdy = this.butterfly.container.y - enemy.container.y;
        const bDist = Math.sqrt(bdx*bdx + bdy*bdy);
        if (bDist < TILE_SIZE * 0.8 && Math.random() < 0.02) {
          this.damageButterfly(enemy.damage);
        }
      }
    }

    // Particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.graphics.x += p.vx * delta / 1000;
      p.graphics.y += p.vy * delta / 1000;
      p.vy += 100 * delta / 1000;
      p.life -= delta;
      if (p.life <= 0) this.particles.splice(i, 1);
    }

    // No fog of war -- all tiles fully visible
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        this.tileSprites[y][x].setAlpha(1);
      }
    }

    this.updateHUD();
  }
}
